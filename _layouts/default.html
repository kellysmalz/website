<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }}" href="{{ site.baseurl }}/feed.xml" />
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  </head>

  <body>
    <div class="wrapper-masthead">
      <div class="container">
        <header class="masthead clearfix">
          <div class="site-info">
            <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
            <p class="site-description">{{ site.description }}</p>
          </div>

          <nav>
            <a href="{{ site.baseurl }}/" {% if page.url == "/" %}class="active"{% endif %}>Home</a>
            <a href="{{ site.baseurl }}/teaching" {% if page.url contains "teaching" %}class="active"{% endif %}>Teaching</a>
            <a href="{{ site.baseurl }}/research" {% if page.url contains "research" %}class="active"{% endif %}>Research</a>
            <a href="{{ site.baseurl }}/service" {% if page.url contains "service" %}class="active"{% endif %}>Service</a>
          </nav>
        </header>
      </div>
    </div>

    <div id="main" role="main" class="container">
      {{ content }}
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          <p style="margin:0; font-size:15px; color:#666;">
            Kelly Smalenberger, Ph.D. &nbsp;·&nbsp;
            <a href="mailto:ksmalenberger@uchicago.edu">ksmalenberger@uchicago.edu</a>
          </p>
        </footer>
      </div>
    </div>

    {% include analytics.html %}
  </body>
</html>
